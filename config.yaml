name: AST Audio Classifier
version: "0.5.5"
slug: ast-audio-classifier
description: Audio Spectrogram Transformer sidecar for RTSP audio classification with MQTT auto-discovery
url: https://github.com/jsnyder/home_assistant
arch:
  - amd64
init: false
startup: application
boot: auto
host_network: true
hassio_api: true
hassio_role: manager

map:
  - config:rw
  - media:rw

options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  cameras: []
  confidence_threshold: 0.15
  auto_off_seconds: 30
  clip_duration_seconds: 3
  log_level: "info"
  openobserve_host: ""
  openobserve_port: 5080
  openobserve_org: "default"
  openobserve_stream: "ast_audio"
  openobserve_username: ""
  openobserve_password: ""
  openobserve_use_ssl: false
  clap_enabled: false
  clap_model: "laion/clap-htsat-fused"
  clap_confirm_threshold: 0.30
  clap_suppress_threshold: 0.15
  clap_override_threshold: 0.40
  clap_discovery_threshold: 0.50
  clap_confirm_margin: 0.20
  llm_judge_enabled: false
  llm_judge_api_base: ""
  llm_judge_api_key: ""
  llm_judge_model: "gemini-2.5-flash"
  llm_judge_sample_rate: 0.10
  llm_judge_max_clips: 5000
  consolidated_enabled: false
  consolidated_window_seconds: 5.0
  auto_discovery: true
  noise_stress_enabled: false
  noise_stress_update_interval: 30
  noise_stress_decay_half_life: 180.0
  noise_stress_saturation: 25.0
  noise_stress_indoor_cameras: []

schema:
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str
  mqtt_password: password
  cameras:
    - name: str
      rtsp_url: str
      db_threshold: "float?"
      cooldown_seconds: "int?"
      battery: "bool?"
      reconnect_interval: "int?"
      highpass_freq: "int?"
      adaptive_threshold: "bool?"
      adaptive_margin_db: "float?"
      go2rtc_stream: "str?"
  auto_discovery: "bool?"
  confidence_threshold: "float?"
  auto_off_seconds: "int?"
  clip_duration_seconds: "int?"
  log_level: "list(debug|info|warning|error)?"
  openobserve_host: "str?"
  openobserve_port: "port?"
  openobserve_org: "str?"
  openobserve_stream: "str?"
  openobserve_username: "str?"
  openobserve_password: "password?"
  openobserve_use_ssl: "bool?"
  clap_enabled: "bool?"
  clap_model: "str?"
  clap_confirm_threshold: "float?"
  clap_suppress_threshold: "float?"
  clap_override_threshold: "float?"
  clap_discovery_threshold: "float?"
  clap_confirm_margin: "float?"
  llm_judge_enabled: "bool?"
  llm_judge_api_base: "str?"
  llm_judge_api_key: "password?"
  llm_judge_model: "str?"
  llm_judge_sample_rate: "float?"
  llm_judge_max_clips: "int?"
  consolidated_enabled: "bool?"
  consolidated_window_seconds: "float?"
  noise_stress_enabled: "bool?"
  noise_stress_update_interval: "int?"
  noise_stress_decay_half_life: "float?"
  noise_stress_saturation: "float?"
  noise_stress_indoor_cameras:
    - "str?"
